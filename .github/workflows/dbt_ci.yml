name: dbt CI

on:
  push:
    branches: [ master ]
    paths:
      - 'phase2/taxi_analytics/**'
      - '.github/workflows/**'
  pull_request:
    branches: [ master ]
    paths:
      - 'phase2/taxi_analytics/**'
      - '.github/workflows/**'

jobs:
  dbt-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install dbt-duckdb

      - name: Create dbt profiles
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << EOF
          taxi_analytics:
            target: dev
            outputs:
              dev:
                type: duckdb
                path: /tmp/dev.duckdb
          EOF

      - name: Run dbt build
        working-directory: phase2/taxi_analytics
        run: |
          dbt build --empty

      - name: Run dbt tests
        working-directory: phase2/taxi_analytics
        run: |
          dbt test